<header class="fixed top-0 w-full z-50 glass-nav">
  <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">

    <!-- Logo -->
    <div class="flex items-center gap-3">
      <span class="material-symbols-outlined text-primary text-4xl"
            style="font-variation-settings:'FILL' 1">
        landscape
      </span>
      <a href="{% url 'camps:home' %}">
        <span class="text-2xl font-extrabold tracking-tight">MHTREKY</span>
      </a>
    </div>

    <!-- Desktop Navigation -->
    <nav class="hidden md:flex gap-10 items-center">

      <a href="{% url 'camps:camp_list' %}"
         class="text-sm font-semibold uppercase tracking-widest hover:text-primary">
        Explore Camps
      </a>

      {% if user.is_authenticated %}

        <a href="{% url 'bookings:my_bookings' %}"
           class="text-sm font-semibold uppercase tracking-widest hover:text-primary">
          My Bookings
        </a>

        <div class="flex items-center gap-4">
          <span class="text-sm font-semibold truncate max-w-[160px]">
            {{ user.email }}
          </span>

          <form method="post" action="{% url 'accounts:logout' %}">
            {% csrf_token %}
            <button type="submit"
              class="bg-red-500 hover:bg-red-600 text-white px-6 py-2.5 rounded-lg font-bold text-sm uppercase">
              Logout
            </button>
          </form>
        </div>

      {% else %}

        <a href="{% url 'accounts:login' %}"
           class="bg-primary hover:opacity-90 text-black px-6 py-2.5 rounded-lg font-bold text-sm uppercase">
          Login
        </a>

      {% endif %}
    </nav>

    <!-- Mobile Hamburger -->
    <button
      class="md:hidden text-white focus:outline-none"
      onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
      <span class="material-symbols-outlined text-3xl">menu</span>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div id="mobile-menu"
       class="hidden md:hidden bg-background-dark border-t border-white/10">
    <div class="px-6 py-6 flex flex-col gap-6">

      <a href="{% url 'camps:camp_list' %}"
         class="text-sm font-bold uppercase tracking-widest hover:text-primary">
        Explore Camps
      </a>

      {% if user.is_authenticated %}

        <a href="{% url 'bookings:my_bookings' %}"
           class="text-sm font-bold uppercase tracking-widest hover:text-primary">
          My Bookings
        </a>

        <span class="text-sm text-white/70 break-all">
          {{ user.email }}
        </span>

        <form method="post" action="{% url 'accounts:logout' %}">
          {% csrf_token %}
          <button type="submit"
            class="w-full bg-red-500 hover:bg-red-600 text-white py-3 rounded-lg font-bold text-sm uppercase">
            Logout
          </button>
        </form>

      {% else %}

        <a href="{% url 'accounts:login' %}"
           class="w-full text-center bg-primary hover:opacity-90 text-black py-3 rounded-lg font-bold text-sm uppercase">
          Login
        </a>

      {% endif %}

    </div>
  </div>
</header>

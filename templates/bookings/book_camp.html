{% extends 'base.html' %}

{% block content %}
<div class="max-w-xl mx-auto p-6 bg-white text-black rounded-lg shadow-md mt-10">
    <h2 class="text-2xl font-bold mb-4">Book {{ camp.name }}</h2>

    {% if error %}
        <div class="bg-red-100 text-red-700 p-3 mb-4 rounded">{{ error }}</div>
    {% endif %}

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block mb-1 font-semibold">Select Date</label>
            <input type="date" name="date" class="w-full border rounded px-3 py-2" required>
        </div>

        

        <div>
            <label class="block mb-1 font-semibold">Number of People</label>
            <input type="number" name="people_count" min="1" max="10" class="w-full border rounded px-3 py-2" required>
        </div>

        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Book Now</button>
    </form>
</div>
{% endblock %}

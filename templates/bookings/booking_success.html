{% extends 'base.html' %}

{% block content %}
<div class="pt-24"> <!-- ✅ ADDED: pushes content below fixed navbar -->

    <div class="max-w-xl mx-auto p-6 bg-green-100 rounded-lg text-center shadow-lg">
        <h2 class="text-2xl font-bold mb-4 text-green-800">
            Booking Confirmed!
        </h2>

        <div class="space-y-2 text-gray-800">
            <p><span class="font-semibold">Camp:</span> {{ booking.camp.name }}</p>
            <p><span class="font-semibold">Date:</span> {{ booking.date }}</p>
            <p><span class="font-semibold">Slot:</span> {{ booking.slot }}</p>
            <p><span class="font-semibold">People:</span> {{ booking.people_count }}</p>
            <p><span class="font-semibold">Total Amount:</span> ₹{{ booking.total_amount }}</p>
        </div>

        <p class="mt-6 font-semibold text-green-700">
            Pay on site.
        </p>
    </div>

</div>
{% endblock %}

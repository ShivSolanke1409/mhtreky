{% load static %}
<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}MHTREKY{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#eead2b",
            "background-dark": "#0a0a08",
            "forest-dark": "#161d14",
          },
          fontFamily: {
            display: ["Manrope", "sans-serif"]
          }
        }
      }
    }
  </script>

  <style>
    .glass-nav {
      background: rgba(10,10,8,0.75);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(238,173,43,0.15);
    }
    .glass-card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .cinematic-overlay {
      background: linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, rgba(10,10,8,1) 95%);
    }
  </style>
</head>

<body class="bg-background-dark font-display text-white">

  {% include "partials/navbar.html" %}

  <main class="pt-16">
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}
{% if messages %}
<div id="toast-container" class="fixed top-6 right-6 z-50 space-y-3">
  {% for message in messages %}
    <div
      class="toast px-6 py-4 rounded-xl shadow-lg text-sm font-semibold transition-all duration-500
      {% if message.tags == 'success' %}
        bg-green-600 text-white
      {% elif message.tags == 'error' %}
        bg-red-600 text-white
      {% elif message.tags == 'warning' %}
        bg-yellow-500 text-black
      {% else %}
        bg-gray-800 text-white
      {% endif %}
      animate-slideIn"
    >
      {{ message }}
    </div>
  {% endfor %}
</div>
{% endif %}

<style>
@keyframes slideIn {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}
.animate-slideIn {
  animation: slideIn 0.3s ease forwards;
}
</style>


<script>
document.addEventListener("DOMContentLoaded", function () {

    const toasts = document.querySelectorAll(".toast");

    toasts.forEach((toast, index) => {

        setTimeout(() => {

            // Exit animation
            toast.style.opacity = "0";
            toast.style.transform = "translateX(40px)";

            setTimeout(() => {
                toast.remove();
            }, 500);

        }, 4000 + (index * 300)); 
        // slight delay between multiple toasts

    });

});
</script>

</body>
</html>
